---
- name: Add tags to all tasks
  tags:
    - always
  block:
    - name: Make sure iris_install_source_dir is defined
      ansible.builtin.assert:
        that:
          - 'iris_install_source_dir is defined'
          - 'iris_install_source_dir != ""'

    - name: Show iris_install_source_dir
      ansible.builtin.debug:
        msg: "iris_install_source_dir: {{ iris_install_source_dir }}"

    - name: Make sure required variables are defined
      ansible.builtin.assert:
        that:
          - '".tar.gz" in iris_install_file'
          - '".sh" in iris_instaserver_file'

    - name: Copy install files via HTTP
      ansible.builtin.get_url:
        url: "{{ iris_install_source_dir }}/{{ item }}"
        dest: "{{ iris_install_files_path }}/{{ item }}"
        validate_certs: false
        # owner: "{{ iris_admin_user }}"
        # group: "{{ iris_admin_group }}"
        mode: "0755"
        force: false
      when: iris_install_source_dir is ansible.builtin.uri(schemes=['http', 'https'])
      loop:
        - "{{ iris_install_file }}"
        - "{{ iris_instaserver_file }}"
        - "{{ iris_key_file }}"

    - name: Copy install files from Ansible server
      ansible.builtin.copy:
        src: "{{ iris_install_source_dir }}/{{ item }}"
        dest: "{{ iris_install_files_path }}/{{ item }}"
        # owner: "{{ iris_admin_user }}"
        # group: "{{ iris_admin_group }}"
        mode: "0755"
        force: false
      when: iris_install_source_dir is not ansible.builtin.uri(schemes=['http', 'https'])
      loop:
        - "{{ iris_install_file }}"
        - "{{ iris_instaserver_file }}"
        - "{{ iris_key_file }}"
