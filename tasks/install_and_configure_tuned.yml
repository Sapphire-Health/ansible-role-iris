---
- name: Add tags to all tasks
  tags:
    - always
  block:
    - name: Get the name of the correct package
      ansible.builtin.find:
        paths: "{{ iris_extracted_install_files_path }}/other/linuxconfig"
        patterns: 'epic-config-*.el{{ ansible_distribution_major_version }}.noarch.rpm'
      register: iris_rpm

    - name: Fail if no RPM package found or if more than one found
      ansible.builtin.fail:
        msg: >-
          No RPM package found matching 'epic-config-*.el{{ ansible_distribution_major_version }}.noarch.rpm'
          in {{ iris_extracted_install_files_path }}/other/linuxconfig
      when: iris_rpm.matched != 1

    - name: Install epic-config package
      ansible.builtin.dnf:
        name: "{{ iris_rpm.files[0].path }}"
        disable_gpg_check: true
        state: present

    - name: Configure hugepagesz
      community.general.ini_file:
        path: /etc/tuned/epic/tuned.conf
        state: present
        mode: "0644"
        owner: root
        group: root
        # no_extra_spaces: true
        section: variables
        option: hugepagesz
        value: 1G
      when: hugepages is defined

    - name: Configure hugepages
      community.general.ini_file:
        path: /etc/tuned/epic/tuned.conf
        state: present
        mode: "0644"
        owner: root
        group: root
        # no_extra_spaces: true
        section: variables
        option: hugepages
        value: "{{ hugepages }}"
      when: hugepages is defined

    - name: Check if instance is AWS EC2
      ansible.builtin.uri:
        url: http://169.254.169.254/latest/api/token
        method: PUT
        headers:
          X-aws-ec2-metadata-token-ttl-seconds: '21600'
        timeout: 2
      register: iris_aws_uri_check
      failed_when: false

    - name: Check if instance is Azure VM
      ansible.builtin.uri:
        url: http://169.254.169.254/metadata/instance?api-version=2021-02-01
        headers:
          Metadata: "true"
        timeout: 2
      register: iris_azure_uri_check
      failed_when: false

    # - name: Show results of AWS URI check
    #   ansible.builtin.debug:
    #     msg: "{{ iris_aws_uri_check }}"

    - name: Set kernel.unknown_nmi_panic = 1 if host is AWS EC2 instance
      community.general.ini_file:
        path: /etc/tuned/epic/tuned.conf
        state: present
        mode: "0644"
        owner: root
        group: root
        # no_extra_spaces: true
        section: sysctl
        option: kernel.unknown_nmi_panic
        value: "1"
      when: iris_aws_uri_check.status == 200

    - name: Set cmdline.4 = nosmt if host is AWS EC2 instance or Azure VM
      community.general.ini_file:
        path: /etc/tuned/epic/tuned.conf
        state: present
        mode: "0644"
        owner: root
        group: root
        # no_extra_spaces: true
        section: bootloader
        option: cmdline.4
        value: "nosmt"
      when: iris_aws_uri_check.status == 200 or iris_azure_uri_check.status == 200

    - name: Get current profile
      ansible.builtin.command: /usr/sbin/tuned-adm profile_info
      changed_when: false
      register: iris_profile_info

    - name: Extract profile name
      ansible.builtin.set_fact:
        iris_profile_info_name: "{{ (iris_profile_info.stdout | regex_search('(?<=Profile name:\\n)(.*)', '\\1'))[0] }}"

    # - name: Show extracted profile name
    #   ansible.builtin.debug:
    #     msg: "{{ iris_profile_info_name }}"

    - name: Run tuned-adm profile command
      ansible.builtin.command: /usr/sbin/tuned-adm profile {{ iris_tuned_profile }}
      register: iris_tunedadm
      changed_when: iris_profile_info_name != iris_tuned_profile

    # - name: Show results of tuned-adm command
    #   ansible.builtin.debug:
    #     msg: "{{ iris_tunedadm }}"

    - name: Start and enable tuned service
      ansible.builtin.service:
        name: tuned
        state: started
        enabled: true

    - name: Run tuned-adm verify command
      ansible.builtin.command: /usr/sbin/tuned-adm verify
      failed_when: false
      changed_when: false
      register: iris_tunedadm_verify

    # - name: Show results of tuned-adm command
    #   ansible.builtin.debug:
    #     msg: "{{ iris_tunedadm_verify }}"

    - name: Reboot to apply tuned settings and test again
      when: iris_tunedadm_verify.rc != 0
      block:
        - name: Reboot when tuned-adm verify fails
          ansible.builtin.reboot:
            msg: "Rebooting to apply tuned configuration changes"
          register: iris_reboot_result

        - name: Run tuned-adm verify command and stop if it fails
          ansible.builtin.command: /usr/sbin/tuned-adm verify
          changed_when: false
